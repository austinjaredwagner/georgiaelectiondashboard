function initExpRemDetailMap(r){
  const id='map-exprem-detail';
  killMap(id);const el=document.getElementById(id);if(!el)return;
  const _evSetD=getEVSet(r.name);
  if(!_evSetD||!Object.keys(_evSetD.county||{}).length){
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px">Upload Expected Votes in Admin to enable this map</div>';
    return;
  }
  const expVotesForContest=_evSetD;
  const m=makeMap(id);
  // Fixed scale: darkest = highest initial expected total across all counties (not current max remaining)
  const maxV=Math.max(...Object.values(expVotesForContest.county||{}).map(ev=>ev.Total||0),1);
  const vals={};
  for(const[cty,ev]of Object.entries(expVotesForContest.county||{})){
    const norm=cty.replace(/ County$/i,'');
    const ct=r.ctyTotals[norm+' County']||r.ctyTotals[cty+' County']||r.ctyTotals[cty]||r.ctyTotals[norm];
    const votesSoFar=ct?sumCands(ct.c):0;
    const rem=Math.max(0,(ev.Total||0)-votesSoFar);
    vals[cty]=rem;vals[norm]=rem;
  }
  function col(v){
    const t=maxV>0?Math.max(0,Math.min(1,v/maxV)):0;
    const r2=Math.round(254*(0.95-t*0.3));const g2=Math.round(243*(0.95-t*0.5));const b2=Math.round(199*(0.95-t*0.7));
    return`rgb(${r2},${g2},${b2})`;
  }
  // Show click hint if any county has precinct-level data
  const anyPrecData=Object.keys(expVotesForContest.county||{}).some(c=>expVotesForContest.precinct?.[normCounty(c)]&&Object.keys(expVotesForContest.precinct[normCounty(c)]).length);
  if(anyPrecData){const t=document.getElementById('map-exprem-detail-title');if(t)t.innerHTML='\u{1F4E5} Expected Votes Remaining by County <span style="font-size:10px;color:var(--muted);font-weight:400">· Click county for precinct detail</span>';}
  L.geoJSON(GA_GEO,{
    style:f=>{
      const n=f.properties.NAME;const v=vals[n+' County']!==undefined?vals[n+' County']:vals[n];
      if(v===undefined||v===null)return{fillColor:'#e5e7eb',weight:0.7,opacity:1,color:'#888',fillOpacity:0.6};
      return{fillColor:col(v),weight:0.7,opacity:1,color:'#888',fillOpacity:0.85};
    },
    onEachFeature:(f,l)=>{
      const n=f.properties.NAME;const cty=n+' County';
      const v=vals[cty]!==undefined?vals[cty]:vals[n];
      const ev=expVotesForContest?.county?.[cty]||expVotesForContest?.county?.[n];
      const hasPr=!!(expVotesForContest?.precinct?.[normCounty(cty)]&&Object.keys(expVotesForContest.precinct[normCounty(cty)]).length);
      l.bindTooltip(`<strong>${n} County</strong><br>Remaining: ${v!==undefined?fmt(v):'N/A'}${ev?`<br>Initial expected: ${fmt(ev.Total||0)}`:''}${hasPr?'<br><em style="color:var(--muted)">Click for precinct detail</em>':''}`,{sticky:true});
      if(hasPr)l.on('click',()=>showEVPrecinctPanel(cty,'ev-prec-panel-detail',window._DR));
    }
  }).addTo(m);
}
// Extract precinct-level vote totals for a county from the raw eData,
// aggregated across all candidates of the highest-vote ballot item.
// Returns [{prec, status, total, ED, AV, ABM, Prov}] sorted by precinct name.
function getCountyPrecinctSummary(ctyName){
  if(!eData)return[];
  const cn=normCounty(ctyName);
  const co=(eData.localResults||[]).find(c=>c.name===ctyName||normCounty(c.name)===cn);
  if(!co)return[];
  // Use the first ballot item that carries precinct results
  let bestBi=null;
  for(const bi of(co.ballotItems||[])){
    if((bi.ballotOptions||[]).some(bo=>(bo.precinctResults||[]).length>0)){bestBi=bi;break;}
  }
  if(!bestBi)return[];
  const precData={};
  for(const bo of(bestBi.ballotOptions||[])){
    for(const pr of(bo.precinctResults||[])){
      const pid=pr.id||pr.name||'';
      if(!precData[pid])precData[pid]={prec:pr.name||pid,status:pr.reportingStatus||'',total:0,ED:0,AV:0,ABM:0,Prov:0};
      precData[pid].total+=(pr.voteCount||0);
      for(const g of(pr.groupResults||[])){const canon=normGroup(g.groupName);if(canon&&precData[pid][canon]!==undefined)precData[pid][canon]+=(g.voteCount||0);}
    }
  }
  return Object.values(precData).sort((a,b)=>a.prec.localeCompare(b.prec));
}

// Render a precinct reporting or vote-type breakdown table for a county.
// mode: 'reporting' (status + votes) | 'votes' (ED/AV/ABM/Prov/Total columns)
function showCountyPrecinctPanel(ctyName,panelId,mode){
  const el=document.getElementById(panelId);if(!el)return;
  const data=getCountyPrecinctSummary(ctyName);
  if(!data.length){
    el.innerHTML=`<div style="padding:12px;color:var(--muted);font-size:12px">No precinct data available for ${ctyName}.</div>`;
    el.style.display='block';return;
  }
  const isVotes=mode==='votes';
  let totV=0,totED=0,totAV=0,totABM=0,totProv=0,repCount=0,tbody='';
  for(const d of data){
    const rep=isReported(d.status);
    if(rep)repCount++;
    totV+=d.total;totED+=d.ED;totAV+=d.AV;totABM+=d.ABM;totProv+=d.Prov;
    if(isVotes){
      tbody+=`<tr style="border-bottom:1px solid var(--border)20">
        <td style="padding:3px 8px">${d.prec}</td>
        <td style="padding:3px 6px;text-align:center;color:${rep?'#15803d':'#b91c1c'}">${rep?'✓':'…'}</td>
        <td style="padding:3px 6px;text-align:right">${d.ED?fmt(d.ED):'—'}</td>
        <td style="padding:3px 6px;text-align:right">${d.AV?fmt(d.AV):'—'}</td>
        <td style="padding:3px 6px;text-align:right">${d.ABM?fmt(d.ABM):'—'}</td>
        <td style="padding:3px 6px;text-align:right">${d.Prov?fmt(d.Prov):'—'}</td>
        <td style="padding:3px 6px;text-align:right;font-weight:500">${fmt(d.total)}</td>
      </tr>`;
    }else{
      tbody+=`<tr style="border-bottom:1px solid var(--border)20">
        <td style="padding:3px 8px">${d.prec}</td>
        <td style="padding:3px 6px;color:${rep?'#15803d':'#b91c1c'}">${rep?'✓ Reported':'⏳ Pending'}</td>
        <td style="padding:3px 6px;text-align:right">${fmt(d.total)}</td>
      </tr>`;
    }
  }
  if(isVotes){
    tbody+=`<tr style="border-top:2px solid var(--border);font-weight:600">
      <td style="padding:4px 8px">Total</td>
      <td style="padding:4px 6px;text-align:center">${repCount}/${data.length}</td>
      <td style="padding:4px 6px;text-align:right">${totED?fmt(totED):'—'}</td>
      <td style="padding:4px 6px;text-align:right">${totAV?fmt(totAV):'—'}</td>
      <td style="padding:4px 6px;text-align:right">${totABM?fmt(totABM):'—'}</td>
      <td style="padding:4px 6px;text-align:right">${totProv?fmt(totProv):'—'}</td>
      <td style="padding:4px 6px;text-align:right">${fmt(totV)}</td>
    </tr>`;
  }else{
    tbody+=`<tr style="border-top:2px solid var(--border);font-weight:600">
      <td style="padding:4px 8px">Total</td>
      <td style="padding:4px 6px">${repCount}/${data.length} reported</td>
      <td style="padding:4px 6px;text-align:right">${fmt(totV)}</td>
    </tr>`;
  }
  const hdrs=isVotes
    ?`<th style="text-align:left;padding:4px 8px">Precinct</th><th style="padding:4px 6px">Status</th><th style="padding:4px 6px">ED</th><th style="padding:4px 6px">AV</th><th style="padding:4px 6px">ABM</th><th style="padding:4px 6px">Prov</th><th style="padding:4px 6px">Total</th>`
    :`<th style="text-align:left;padding:4px 8px">Precinct</th><th style="padding:4px 6px">Status</th><th style="padding:4px 6px">Votes</th>`;
  el.innerHTML=`<div style="padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong style="font-size:13px">${ctyName} — Precinct ${isVotes?'Vote Totals':'Reporting'}</strong>
      <button onclick="document.getElementById('${panelId}').style.display='none'" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1">×</button>
    </div>
    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border);text-align:right">${hdrs}</tr></thead>
      <tbody>${tbody}</tbody>
    </table></div>
  </div>`;
  el.style.display='block';
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// Render a precinct-level EV breakdown table inside panelId.
// Pass r (contest results object) to include actual votes cast; null to use raw eData.
function showEVPrecinctPanel(ctyName,panelId,r){
  const el=document.getElementById(panelId);if(!el)return;
  const cn=normCounty(ctyName);
  const _evForPanel=r?.name?getEVSet(r.name):expVotes;
  const precincts=_evForPanel?.precinct?.[cn];
  if(!precincts||!Object.keys(precincts).length){
    el.innerHTML=`<div style="padding:12px;color:var(--muted);font-size:12px">No precinct-level expected vote data for ${ctyName}.</div>`;
    el.style.display='block';return;
  }
  // Actual votes per precinct — prefer contest rows, fall back to raw eData summary
  const actualByPrec={};
  if(r){
    const pRows=r.rows.filter(row=>row.co===ctyName||row.co===cn);
    for(const row of pRows){const tot=r.cands.reduce((s,c)=>s+(row.c[c]?.Total||0),0);actualByPrec[row.prec]={total:tot};}
  }else{
    for(const d of getCountyPrecinctSummary(ctyName))actualByPrec[d.prec]={total:d.total};
  }
  const hasActual=Object.keys(actualByPrec).length>0;
  const entries=Object.entries(precincts).sort((a,b)=>a[0].localeCompare(b[0]));
  let totED=0,totAV=0,totABM=0,totProv=0,totExp=0,totAct=0,tbody='';
  for(const[prec,ev]of entries){
    const actual=actualByPrec[prec]?.total??null;
    const rem=actual!==null?Math.max(0,(ev.Total||0)-actual):null;
    totED+=(ev.ED||0);totAV+=(ev.AV||0);totABM+=(ev.ABM||0);totProv+=(ev.Prov||0);totExp+=(ev.Total||0);
    if(actual!==null)totAct+=actual;
    tbody+=`<tr style="border-bottom:1px solid var(--border)20">
      <td style="padding:3px 8px">${prec}</td>
      <td style="padding:3px 6px;text-align:right">${ev.ED?fmt(ev.ED):'—'}</td>
      <td style="padding:3px 6px;text-align:right">${ev.AV?fmt(ev.AV):'—'}</td>
      <td style="padding:3px 6px;text-align:right">${ev.ABM?fmt(ev.ABM):'—'}</td>
      <td style="padding:3px 6px;text-align:right">${ev.Prov?fmt(ev.Prov):'—'}</td>
      <td style="padding:3px 6px;text-align:right;font-weight:500">${ev.Total?fmt(ev.Total):'—'}</td>
      ${hasActual?`<td style="padding:3px 6px;text-align:right">${actual!==null?fmt(actual):'—'}</td><td style="padding:3px 6px;text-align:right;color:${rem===0?'#15803d':'inherit'}">${rem!==null?fmt(rem):'—'}</td>`:''}
    </tr>`;
  }
  const totRem=Math.max(0,totExp-totAct);
  tbody+=`<tr style="border-top:2px solid var(--border);font-weight:600">
    <td style="padding:4px 8px">Total</td>
    <td style="padding:4px 6px;text-align:right">${totED?fmt(totED):'—'}</td>
    <td style="padding:4px 6px;text-align:right">${totAV?fmt(totAV):'—'}</td>
    <td style="padding:4px 6px;text-align:right">${totABM?fmt(totABM):'—'}</td>
    <td style="padding:4px 6px;text-align:right">${totProv?fmt(totProv):'—'}</td>
    <td style="padding:4px 6px;text-align:right">${totExp?fmt(totExp):'—'}</td>
    ${hasActual?`<td style="padding:4px 6px;text-align:right">${fmt(totAct)}</td><td style="padding:4px 6px;text-align:right">${fmt(totRem)}</td>`:''}
  </tr>`;
  el.innerHTML=`<div style="padding:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <strong style="font-size:13px">${ctyName} — Expected Votes by Precinct</strong>
      <button onclick="document.getElementById('${panelId}').style.display='none'" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1">×</button>
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="border-bottom:1px solid var(--border);text-align:right">
        <th style="text-align:left;padding:4px 8px">Precinct</th>
        <th style="padding:4px 6px">Exp ED</th>
        <th style="padding:4px 6px">Exp AV</th>
        <th style="padding:4px 6px">Exp ABM</th>
        <th style="padding:4px 6px">Exp Prov</th>
        <th style="padding:4px 6px">Exp Total</th>
        ${hasActual?'<th style="padding:4px 6px">Actual</th><th style="padding:4px 6px">Remaining</th>':''}
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table></div>
  </div>`;
  el.style.display='block';
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ============================================================
// PRECINCT GEO HELPERS
// ============================================================
const PREC_STOP=new Set(['precinct','county','the','of','at','no','and','community','center','church','school','building','complex']);
function normP(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}
function precCore(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w&&!PREC_STOP.has(w)&&!/^\d+$/.test(w)).join(' ');}
function matchPrecName(sosName,shpByName){
  const su=sosName.trim().toUpperCase();const sn=normP(sosName);const sc=precCore(sosName);
  // 1. Exact uppercase
  for(const[k,v]of Object.entries(shpByName))if(k.toUpperCase()===su)return v;
  // 2. Normalized
  for(const[k,v]of Object.entries(shpByName))if(normP(k)===sn)return v;
  // 3. After-dash in SHP name (e.g. SHP="3172A - YOUNG FARMER'S" → "YOUNG FARMER'S")
  for(const[k,v]of Object.entries(shpByName)){const after=k.includes(' - ')?k.split(' - ').pop().trim():k;if(normP(after)===sn)return v;}
  // 4. Substring overlap ≥4 chars
  for(const[k,v]of Object.entries(shpByName)){const kn=normP(k.includes(' - ')?k.split(' - ').pop().trim():k);if(kn.length>=4&&(kn.includes(sn)||sn.includes(kn)))return v;}
  // 5. Core-word overlap
  for(const[k,v]of Object.entries(shpByName)){const after=k.includes(' - ')?k.split(' - ').pop().trim():k;const kc=precCore(after);if(kc&&sc&&kc.length>=4&&(kc.includes(sc)||sc.includes(kc)))return v;}
  // 6. Before-dash in SOS name (e.g. SOS="100 - City Auditorium" → match SHP "100")
  if(sosName.includes(' - ')){const before=normP(sosName.split(' - ')[0].trim());if(before.length>=1){for(const[k,v]of Object.entries(shpByName))if(normP(k)===before)return v;}}
  // 7. Expand directional abbreviations and St.→Saint, then match
  const expandAb=s=>s.replace(/\bNE\b/g,'NORTHEAST').replace(/\bNW\b/g,'NORTHWEST').replace(/\bSE\b/g,'SOUTHEAST').replace(/\bSW\b/g,'SOUTHWEST').replace(/\bST\.\s*/g,'SAINT ').replace(/\bST\b/g,'SAINT');
  const exSN=normP(expandAb(sosName.trim().toUpperCase()));
  for(const[k,v]of Object.entries(shpByName)){const kAfter=k.includes(' - ')?k.split(' - ').pop().trim():k;if(normP(expandAb(kAfter.trim().toUpperCase()))===exSN)return v;}
  // 8. Ordinal number words (ONE→1, TWO→2, etc.)
  const ORDW={ONE:'1',TWO:'2',THREE:'3',FOUR:'4',FIVE:'5',SIX:'6',SEVEN:'7',EIGHT:'8',NINE:'9',TEN:'10'};
  const replOrd=s=>{let t=s.toUpperCase();for(const[w,n]of Object.entries(ORDW))t=t.replace(new RegExp('\\b'+w+'\\b','g'),n);return t;};
  const ordSN=normP(replOrd(sosName));
  for(const[k,v]of Object.entries(shpByName)){if(normP(replOrd(k))===ordSN)return v;}
  // 9. Levenshtein fuzzy (edit distance ≤2 for names ≥5 chars; block opposite-directional swaps)
  function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;const d=Array.from({length:m+1},(_,i)=>i);for(let j=1;j<=n;j++){let p=d[0];d[0]=j;for(let i=1;i<=m;i++){const t2=d[i];d[i]=a[i-1]===b[j-1]?p:1+Math.min(p,d[i-1],d[i]);p=t2;}}return d[m];}
  function dirsConflict(a,b){const pairs=[['east','west'],['north','south']];for(const[d1,d2]of pairs){if((a.includes(d1)&&b.includes(d2))||(a.includes(d2)&&b.includes(d1)))return true;}return false;}
  if(sn.length>=5){let best=null,bestD=3,bestK=null;for(const[k,v]of Object.entries(shpByName)){const kn2=normP(k.includes(' - ')?k.split(' - ').pop().trim():k);if(Math.abs(kn2.length-sn.length)>2)continue;const d2=lev(sn,kn2);if(d2<bestD){bestD=d2;best=v;bestK=kn2;}}if(best&&!dirsConflict(sn,bestK))return best;}
  return null;
}
async function getPrecinctGeo(){
  if(GA_PREC_GEO)return GA_PREC_GEO;
  const bin=atob(GA_PREC_B64);const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip');
  const writer=ds.writable.getWriter();const reader=ds.readable.getReader();
  writer.write(bytes);writer.close();
  const chunks=[];
  while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);}
  const total=chunks.reduce((s,c)=>s+c.length,0);
  const all=new Uint8Array(total);let off=0;
  for(const c of chunks){all.set(c,off);off+=c.length;}
  GA_PREC_GEO=JSON.parse(new TextDecoder().decode(all));
  precGeoByCounty={};
  for(const f of GA_PREC_GEO.features){const cfp=f.properties.COUNTY;if(!precGeoByCounty[cfp])precGeoByCounty[cfp]=[];precGeoByCounty[cfp].push(f);}
  return GA_PREC_GEO;
}
async function drillToPrecinctDetail(r,metric,candIdx,ctyName,mapId='map-d1'){
  const id1=mapId;const m1=maps[id1];if(!m1)return;
  try{await getPrecinctGeo();}catch(e){toast('Could not load precinct data: '+e.message,true);return;}
  const ctyFeat=GA_GEO.features.find(f=>(f.properties.NAME+' County')===ctyName||f.properties.NAME===ctyName);
  if(!ctyFeat)return;
  const cfp=ctyFeat.properties.COUNTY;
  const features=precGeoByCounty[cfp]||[];
  if(!features.length){toast('No precinct boundaries for '+ctyName,true);return;}
  const shpByName={};
  for(const f of features){shpByName[f.properties.NAME]=f.properties.GEOID;if(f.properties.ALT)shpByName[f.properties.ALT]=f.properties.GEOID;}
  const cand=r.cands[candIdx]||r.cands[0];
  const pRows=r.rows.filter(row=>row.co===ctyName||row.co===ctyName.replace(/ County$/,''));
  const geoidData={};const allVals=[];
  for(const row of pRows){
    const geoid=matchPrecName(row.prec,shpByName);if(!geoid)continue;
    const tot=Object.values(row.c).reduce((s,v)=>s+(v.Total||0),0);
    const v=row.c[cand]?.Total||0;const p=tot>0?v/tot:null;
    let val=null;
    if(metric==='pct')val=p;
    else if(metric==='votes')val=v;
    else if(metric==='bench'){const bm=getBench(r.name,row.co,row.prec);const b=bm?bm[cand]:null;val=b!==null&&p!==null?p-b:null;}
    else if(metric==='exprem'){const ev=getEV(row.co,row.prec,r.name);val=ev?Math.max(0,(ev.Total||0)-v):null;}
    if(val!==null)allVals.push(val);
    geoidData[geoid]={c:row.c,val,tot,prec:row.prec,status:row.status};
  }
  const maxV=allVals.length?Math.max(...allVals):1;
  function colP(v){
    if(v===null||isNaN(v))return'#ccc';
    if(metric==='bench'){
      const t=Math.max(-0.25,Math.min(0.25,v))/0.25;
      if(t>=0){const t2=Math.min(1,t);return`rgb(${Math.round(255*(1-t2*0.8))},255,${Math.round(255*(1-t2*0.8))})`;}
      else{const t2=Math.min(1,-t);return`rgb(255,${Math.round(255*(1-t2*0.8))},${Math.round(255*(1-t2*0.8))})`;}
    }
    if(metric==='exprem'){const t=maxV>0?Math.max(0,Math.min(1,v/maxV)):0;return`rgb(${Math.round(254*(0.95-t*0.3))},${Math.round(243*(0.95-t*0.5))},${Math.round(199*(0.95-t*0.7))})`;}
    const t=maxV>0?Math.max(0,Math.min(1,v/maxV)):0;
    const r2=Math.round(255*(1-t*0.7));const g=Math.round(255*(1-t*0.6));const b=Math.round(80+175*t);
    return`rgb(${r2},${g},${b})`;
  }
  m1.eachLayer(l=>{if(!(l instanceof L.TileLayer))m1.removeLayer(l);});
  const precLayer=L.geoJSON({type:'FeatureCollection',features},{
    style:f=>{
      const d=geoidData[f.properties.GEOID];
      if(!d||d.val===null)return{fillColor:'#e5e7eb',weight:0.5,color:'#aaa',fillOpacity:0.35};
      return{fillColor:colP(d.val),weight:0.5,color:'#fff',fillOpacity:0.85};
    },
    onEachFeature:(f,l)=>{
      const d=geoidData[f.properties.GEOID];const name=f.properties.NAME;
      if(d){
        const tot=d.tot;const v=d.c[cand]?.Total||0;const p=tot>0?v/tot:null;
        const bm=getBench(r.name,ctyName,d.prec);const b=bm?bm[cand]:null;
        const diff=b!==null&&p!==null?p-b:null;
        const ev=getEV(ctyName,d.prec,r.name);const rem=ev?Math.max(0,(ev.Total||0)-v):null;
        l.bindTooltip(
          `<strong>${d.prec||name}</strong>${d.status?' · '+d.status:''}<br>`+
          `<em>${cand}</em>: ${fmt(v)} (${pct(p)})`+
          (b!==null?`<br>Bench: ${pct(b)} | Diff: ${diff>=0?'+':''}${pct(diff,2)}`:'')+(rem!==null?`<br>Est. Rem: ${fmt(rem)}`:''),
          {sticky:true,maxWidth:240});
      }else{
        l.bindTooltip(`<strong>${name}</strong><br><i style="color:#999">No data or unmatched</i>`,{sticky:true});
      }
    }
  }).addTo(m1);
  m1.fitBounds(precLayer.getBounds(),{padding:[10,10]});
  if(mapId==='map-d1')detailDrillCty=ctyName;
  const card=document.getElementById(mapId)?.closest('.map-card');
  if(card){
    const title=card.querySelector('.map-title');
    if(title){
      if(!title.dataset.origTitle)title.dataset.origTitle=title.innerHTML;
      const resetCall=mapId==='map-d1'
        ?`resetToDetailCountyView(window._DR)`
        :`resetCandMapToCountyView(window._DR,'${mapId}','${metric}',${candIdx})`;
      title.innerHTML=`<button onclick="${resetCall}" style="background:none;border:none;cursor:pointer;color:var(--primary);font-size:12px;padding:0 6px 0 0">← Counties</button>${ctyName} Precincts`;
    }
  }
  const legId=mapId==='map-d1'?'map-d1-legend':mapId+'-leg';
  const leg=document.getElementById(legId);
  if(leg){const matched=Object.keys(geoidData).length;const total=pRows.length;leg.innerHTML+=`<span style="font-size:10px;color:var(--muted);margin-left:8px">${matched}/${total} matched</span>`;}
}

async function drillToPrecincts(r,cname,ctyName){
  const id2='map-d2';const m2=maps[id2];if(!m2)return;
  try{await getPrecinctGeo();}catch(e){toast('Could not load precinct data: '+e.message,true);return;}
  const ctyFeat=GA_GEO.features.find(f=>(f.properties.NAME+' County')===ctyName||f.properties.NAME===ctyName);
  if(!ctyFeat)return;
  const cfp=ctyFeat.properties.COUNTY;
  const features=precGeoByCounty[cfp]||[];
  if(!features.length){toast('No precinct boundaries for '+ctyName,true);return;}
  const shpByName={};
  for(const f of features){shpByName[f.properties.NAME]=f.properties.GEOID;if(f.properties.ALT)shpByName[f.properties.ALT]=f.properties.GEOID;}
  const sorted=[...r.cands].sort((a,b)=>(r.st.c[b]?.Total||0)-(r.st.c[a]?.Total||0));
  const pRows=r.rows.filter(row=>row.co===ctyName||row.co===ctyName.replace(/ County$/,''));
  const geoidData={};
  for(const row of pRows){
    const geoid=matchPrecName(row.prec,shpByName);if(!geoid)continue;
    const tot=Object.values(row.c).reduce((s,v)=>s+(v.Total||0),0);
    let leader=null,leaderV=0;
    for(const c of r.cands){const v=row.c[c]?.Total||0;if(v>leaderV){leaderV=v;leader=c;}}
    const ci=sorted.indexOf(leader);
    const col=leader?getCandColor(leader,ci>=0?ci:0,cname):'#e5e7eb';
    const margin=tot>0&&leader?leaderV/tot:0;
    geoidData[geoid]={c:row.c,leader,col,tot,margin,prec:row.prec,status:row.status};
  }
  // Remove old layers
  m2.eachLayer(l=>{if(!(l instanceof L.TileLayer))m2.removeLayer(l);});
  const precLayer=L.geoJSON({type:'FeatureCollection',features},{
    style:f=>{
      const d=geoidData[f.properties.GEOID];
      if(!d)return{fillColor:'#e5e7eb',weight:0.5,color:'#aaa',fillOpacity:0.35};
      const alpha=Math.min(0.9,0.3+d.margin*0.6);
      return{fillColor:d.col,weight:0.5,color:'#fff',fillOpacity:alpha};
    },
    onEachFeature:(f,l)=>{
      const d=geoidData[f.properties.GEOID];const name=f.properties.NAME;
      if(d){
        const rows=sorted.map(c=>`<tr><td style="padding-right:8px">${shortName(c)}</td><td>${fmt(d.c[c]?.Total||0)}</td><td style="color:var(--muted)">${d.tot>0?pct((d.c[c]?.Total||0)/d.tot):'—'}</td></tr>`).join('');
        l.bindTooltip(`<strong>${d.prec||name}</strong>${d.status?' · '+d.status:''}<br><table style="font-size:11px">${rows}</table>`,{sticky:true,maxWidth:220});
      }else{
        l.bindTooltip(`<strong>${name}</strong><br><i style="color:#999">No data or unmatched</i>`,{sticky:true});
      }
    }
  }).addTo(m2);
  m2.fitBounds(precLayer.getBounds(),{padding:[10,10]});
  h2hDrillCty=ctyName;
  // Update map card title with back button
  const card=document.getElementById('map-d2')?.closest('.map-card');
  if(card){
    const title=card.querySelector('.map-title');
    if(title)title.innerHTML=`<button onclick="resetToCountyView(window._DR)" style="background:none;border:none;cursor:pointer;color:var(--primary);font-size:12px;padding:0 6px 0 0">← Counties</button>${ctyName} Precincts`;
  }
  // Update legend
  const leg=document.getElementById('map-d2-legend');
  if(leg){
    const matched=Object.keys(geoidData).length;const total=pRows.length;
    const items=sorted.slice(0,4).map((c,i)=>`<span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px"><span style="display:inline-block;width:12px;height:12px;background:${getCandColor(c,i,cname)};border-radius:2px;opacity:0.8"></span><span style="font-size:10px">${shortName(c)}</span></span>`).join('');
    leg.innerHTML=items+`<span style="font-size:10px;color:var(--muted);margin-left:6px">${matched}/${total} precincts matched</span>`;
  }
}

function initHeadToHeadMap(r){
  const id2='map-d2';
  const m2=makeMap(id2);
  const sorted=[...r.cands].sort((a,b)=>(r.st.c[b]?.Total||0)-(r.st.c[a]?.Total||0));
  L.geoJSON(GA_GEO,{
    style:f=>{
      const n=f.properties.NAME;const cty=n+' County';
      const ct=r.ctyTotals[cty]||r.ctyTotals[n];
      if(!ct||sumCands(ct.c)===0)return{fillColor:'#e5e7eb',weight:0.7,opacity:1,color:'#888',fillOpacity:0.5};
      let leader=null,leaderV=0;
      for(const c of r.cands){const v=ct.c[c]?.Total||0;if(v>leaderV){leaderV=v;leader=c;}}
      if(!leader)return{fillColor:'#e5e7eb',weight:0.7,opacity:1,color:'#888',fillOpacity:0.5};
      const ci=sorted.indexOf(leader);
      const tot=sumCands(ct.c);const margin=tot>0?leaderV/tot:0;
      const baseCol=getCandColor(leader,ci,r.name);
      const alpha=0.25+margin*0.65;
      return{fillColor:baseCol,weight:0.7,opacity:1,color:'#555',fillOpacity:alpha};
    },
    onEachFeature:(f,l)=>{
      const n=f.properties.NAME;const cty=n+' County';
      const ct=r.ctyTotals[cty]||r.ctyTotals[n];if(!ct)return;
      const tot=sumCands(ct.c);
      let leader=null,leaderV=0;
      for(const c of r.cands){const v=ct.c[c]?.Total||0;if(v>leaderV){leaderV=v;leader=c;}}
      const margin=tot>0&&leader?leaderV/tot:0;
      const rows=sorted.map(c=>`${c}: ${fmt(ct.c[c]?.Total||0)} (${pct(tot>0?(ct.c[c]?.Total||0)/tot:null)})`).join('<br>');
      l.bindTooltip(`<strong>${n} County</strong><br>${rows}${leader?`<br><em>Leader: ${leader} +${pct(margin,1)}</em>`:''}`);l.on('click',()=>{if(window._DR&&window._DR.hasPr)drillToPrecincts(window._DR,window._DR.name,cty);});
    }
  }).addTo(m2);
  // Legend for head-to-head map
  const leg=document.getElementById('map-d2-legend');
  if(leg){
    const items=sorted.slice(0,4).map((c,i)=>`<span style="display:inline-flex;align-items:center;gap:3px;margin-right:8px"><span style="display:inline-block;width:12px;height:12px;background:${getCandColor(c,i,r.name)};border-radius:2px;opacity:0.8"></span><span style="font-size:10px">${shortName(c)}</span></span>`).join('');
    leg.innerHTML=items+'<span style="font-size:10px;color:var(--muted);margin-left:4px">(darker = larger margin)</span>';const t=document.getElementById('map-d2-title');if(t&&r.hasPr)t.innerHTML='🥊 Head-to-Head by County <span style="font-size:10px;color:var(--muted);font-weight:400">· Click county for precinct view</span>';
  }
}

function downloadBMTemplate(cname){
  if(!pData||!eData){toast('Load election data first',true);return;}
  const r=getResults(cname);
  if(!r){toast('Contest not found: '+cname,true);return;}
  const cands=r.cands;
  // Two-section XLSX format matching the benchmark library:
  // Section 1 — county-level benchmarks
  // Section 2 — precinct-level benchmarks (blank row separator between sections)
  const aoa=[];
  const counties=[...new Set(r.rows.map(row=>row.co))].sort();
  // ── Section 1: County benchmarks ──
  aoa.push([cname,null,...cands]);                          // Row 1: contest + candidates
  aoa.push([null,'COUNTY',...cands.map(()=>'Bench%')]);     // Row 2: header
  for(const cty of counties)
    aoa.push([null,cty,...cands.map(()=>null)]);            // county rows (null = blank cell)
  aoa.push([null,'TOTAL',...cands.map(()=>null)]);          // TOTAL row
  if(r.hasPr){
    // ── Section 2: Precinct benchmarks ──
    aoa.push([]);                                           // blank separator row
    aoa.push([null,null,...cands]);                         // section 2 header row 1
    aoa.push(['COUNTY','PRECINCT',...cands.map(()=>'Bench%')]); // section 2 header row 2
    for(const cty of counties){
      const precs=[...new Set(r.rows.filter(row=>row.co===cty).map(row=>row.prec))].sort();
      for(const prec of precs)
        aoa.push([cty,prec,...cands.map(()=>null)]);        // precinct rows (null = blank cell)
    }
  }
  // Generate XLSX via SheetJS
  try{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    // Column widths
    ws['!cols']=[{wch:20},{wch:40},...cands.map(()=>({wch:12}))];
    XLSX.utils.book_append_sheet(wb,ws,'Benchmark');
    XLSX.writeFile(wb,cname.replace(/[^a-z0-9]/gi,'_').substring(0,60)+'_benchmark_template.xlsx');
    toast('XLSX template downloaded for: '+cname.substring(0,40));
  }catch(xlsxErr){
    // Fallback to CSV if XLSX write fails
    const csv=aoa.map(row=>row.map(v=>'"'+String(v===null?'':v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=cname.replace(/[^a-z0-9]/gi,'_').substring(0,60)+'_benchmark_template.csv';
    a.click();URL.revokeObjectURL(a.href);
    toast('CSV template downloaded (XLSX unavailable)');
  }
}
function downloadEVTemplate(){
  if(!pData||!eData){toast('Load election data first',true);return;}
  // Precinct-only rows — county totals are aggregated automatically from precinct data
  const rows=[['County','Precinct','Registered_Voters','Expected_ED','Expected_AV','Expected_ABM','Expected_Prov','Expected_Total']];
  const allRows=[];
  for(const contest of pData.contests.filter(c=>c.sw).slice(0,1)){
    const r=getResults(contest.name);if(!r)continue;
    const seen=new Set();
    const counties=[...new Set(r.rows.map(row=>row.co))].sort();
    for(const cty of counties){
      if(r.hasPr){
        const precs=[...new Set(r.rows.filter(row=>row.co===cty).map(row=>row.prec))].sort();
        for(const prec of precs){if(!seen.has(cty+'|'+prec)){seen.add(cty+'|'+prec);allRows.push([cty,prec,'','','','','','']);}}
      }else{
        if(!seen.has(cty+'|')){seen.add(cty+'|');allRows.push([cty,'(county total)','','','','','','']);}
      }
    }
    break;
  }
  if(!allRows.length){
    // Fallback: use all counties from stateStats
    const counties=Object.keys(pData.stateStats||{}).sort();
    for(const cty of counties)allRows.push([cty,'','','','','','','']);
  }
  rows.push(...allRows);
  const csv=rows.map(r2=>r2.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='expected_votes_template.csv';
  a.click();URL.revokeObjectURL(a.href);
  toast('Expected votes template downloaded');
}
function downloadBMData(encName){
  const cname=decodeURIComponent(encName);
  const bm=benchmarks[cname];if(!bm){toast('No benchmark data',true);return;}
  const r=getResults(cname);
  // Collect candidate names from stored data
  const allCands=new Set([
    ...Object.keys(bm.total||{}),
    ...Object.values(bm.county||{}).flatMap(Object.keys),
    ...Object.values(bm.precinct||{}).flatMap(co=>Object.values(co).flatMap(Object.keys))
  ]);
  const cands=[...allCands];
  const counties=r?[...new Set(r.rows.map(row=>row.co))].sort():Object.keys(bm.county||{}).sort();
  const aoa=[];
  // Section 1: county
  aoa.push([cname,null,...cands]);
  aoa.push([null,'COUNTY',...cands.map(()=>'Bench%')]);
  for(const cty of counties){
    const cn=normCounty(cty);
    const cb=bm.county?.[cn]||bm.county?.[cty]||{};
    aoa.push([null,cty,...cands.map(c=>cb[c]!==undefined?cb[c]:null)]);
  }
  const tb=bm.total||{};
  aoa.push([null,'TOTAL',...cands.map(c=>tb[c]!==undefined?tb[c]:null)]);
  // Section 2: precincts
  const hasPrecinct=Object.keys(bm.precinct||{}).length>0;
  if(hasPrecinct){
    aoa.push([]);
    aoa.push([null,null,...cands]);
    aoa.push(['COUNTY','PRECINCT',...cands.map(()=>'Bench%')]);
    for(const cty of counties){
      const cn=normCounty(cty);
      const cp=bm.precinct?.[cn]||bm.precinct?.[cty]||{};
      for(const prec of Object.keys(cp).sort()){
        const pb=cp[prec]||{};
        aoa.push([cty,prec,...cands.map(c=>pb[c]!==undefined?pb[c]:null)]);
      }
    }
  }
  try{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:20},{wch:40},...cands.map(()=>({wch:12}))];
    XLSX.utils.book_append_sheet(wb,ws,'Benchmark');
    XLSX.writeFile(wb,cname.replace(/[^a-z0-9]/gi,'_').substring(0,60)+'_benchmark.xlsx');
    toast('Downloaded: '+cname.substring(0,40));
  }catch(e){toast('Export failed: '+e.message,true);}
}
